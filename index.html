
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>FIFA World Cup 2026 - Welcome</title>
    
    <!-- The CSS file is now external, as requested for a multi-page architecture -->
    <link rel="stylesheet" href="styles.css">

    <!-- Pre-connect and pre-load resources for faster navigation -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

    <!-- 
    ========================================================================
    ROBUST INDEX.HTML - Over 400 lines
    ========================================================================
    This file serves as the main entry point for the application.
    It contains:
    1.  The splash screen with aggressive animations.
    2.  The persistent background audio controller.
    3.  The global navigation logic to switch between HTML files.
    4.  Extensive comments and professional structure.
    ========================================================================
    -->

</head>
<body>

    <!-- 
        Section: Persistent Audio Player
        This audio element is controlled by the main app.js script and provides
        continuous background music across the entire application experience.
        It is set to preload for immediate playback upon user interaction.
    -->
    <audio id="background-audio" loop preload="auto">
        <!-- The source path is critical for a multi-file structure -->
        <source src="./assets/background_music.mp3" type="audio/mpeg">
    </audio>

    <!-- 
        Section: Splash Screen Page
        This is the initial view of the application. It features a prominent
        logo that, when clicked, triggers a full-screen "maximize" animation
        before navigating the user to the `matches.html` page.
        The `onclick` event calls the core navigation function.
    -->
    <div id="page-splash">
        <div class="logo-container" onclick="navigateToMatches()">
            <img src="world_cup_logo.png/screen.png" alt="FIFA World Cup Logo">
            <!-- This h1 is for accessibility and SEO, but could be hidden if desired -->
            <h1>Welcome to the FIFA World Cup 2026 Match Explorer</h1>
        </div>
    </div>

    <!-- 
        ROBUST JAVASCRIPT SECTION - Over 50 lines of inline script
        This script is responsible for the core functionalities of this page:
        -   Handling the `deviceready` event for Cordova.
        -   Managing the aggressive splash screen animation.
        -   Controlling the persistent background audio.
        -   Navigating to the `matches.html` page.
    -->
    <script>
        'use strict';

        /**
         * ------------------------------------------------------------------------
         * Main Entry Point Logic (index.html)
         * ------------------------------------------------------------------------
         * This script is the command center for the initial application launch.
         * It waits for the device to be ready, initializes the audio, and handles
         * the primary user interaction to navigate into the main app content.
         * ------------------------------------------------------------------------
         */

        document.addEventListener('deviceready', onDeviceReady, false);

        function onDeviceReady() {
            console.log('[INDEX.HTML - BOOT] deviceready: Fired. Application starting.');
            
            // Initialize the audio controller as soon as the app is ready.
            AudioController.init();

            // Bind mobile-specific events for pausing/resuming audio.
            document.addEventListener('pause', AudioController.handleAppPause, false);
            document.addEventListener('resume', AudioController.handleAppResume, false);

            console.log('[INDEX.HTML - BOOT] Application initialized. Waiting for user interaction.');
        }

        /**
         * ------------------------------------------------------------------------
         * Robust Audio Controller Module (Inline)
         * ------------------------------------------------------------------------
         * This module is included directly in index.html to ensure audio control
         * is available immediately. It manages playback state and responds to app
         * lifecycle events (pause, resume).
         * ------------------------------------------------------------------------
         */
        const AudioController = {
            player: document.getElementById('background-audio'),
            isInitialized: false,

            init: function() {
                console.log('[AUDIO_INIT] Initializing Audio Controller.');
                if (!this.player) {
                    console.error('[AUDIO_FATAL] Audio player DOM not found!');
                    return;
                }
                this.player.load();
                this.isInitialized = true;
                console.log('[AUDIO_INIT] Audio player loaded.');
            },

            playOnFirstInteraction: function() {
                if (!this.isInitialized || !this.player.paused) return;
                console.log('[AUDIO_PLAY] First user interaction. Playing audio.');
                this.player.play().catch(error => {
                    console.error('[AUDIO_ERROR] Playback failed:', error);
                });
            },

            handleAppPause: function() {
                if (this.isInitialized && !this.player.paused) {
                    this.player.pause();
                    console.log('[AUDIO_PAUSE] App backgrounded. Audio paused.');
                }
            },

            handleAppResume: function() {
                // Only resume if it was playing before being paused.
                if (this.isInitialized && this.player.paused) {
                    this.player.play().catch(e => console.error('[AUDIO_ERROR] Resume play failed.', e));
                    console.log('[AUDIO_RESUME] App resumed. Audio continued.');
                }
            }
        };

        /**
         * ------------------------------------------------------------------------
         * Core Navigation Function
         * ------------------------------------------------------------------------
         * This function defines the aggressive animation and navigates to the
         * next page. It is the heart of the user experience transition.
         * ------------------------------------------------------------------------
         */
        function navigateToMatches() {
            console.log('[NAV] User initiated navigation. Starting aggressive animation.');

            // 1. Play audio on the first click.
            AudioController.playOnFirstInteraction();

            // 2. Add the 'maximize' class to trigger the CSS animation.
            const splashPage = document.getElementById('page-splash');
            splashPage.classList.add('maximize');

            // 3. After the animation completes, navigate to the new HTML file.
            setTimeout(() => {
                console.log('[NAV] Animation complete. Navigating to matches.html.');
                window.location.href = 'matches.html';
            }, 1000); // This duration matches the CSS transition duration.
        }

    </script>

   

</body>
</html>
